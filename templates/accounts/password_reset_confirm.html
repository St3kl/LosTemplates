{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    {% if validlink %}

                        <h2 class="mb-4">
                            Set New Password
                        </h2>

                        <form method="POST">

                            {% csrf_token %}

                            {{ form.as_p }}

                            <button
                                type="submit"
                                class="btn btn-primary"
                            >

                                Change Password

                            </button>

                        </form>

                    {% else %}

                        <div class="alert alert-danger">

                            This password-reset link is invalid or
                            has already been used.

                        </div>

                        <a
                            href="{% url 'accounts:password_reset' %}"
                            class="btn btn-primary"
                        >

                            Request a New Link

                        </a>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
