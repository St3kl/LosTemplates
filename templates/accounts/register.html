{% extends "base.html" %}

{% block content %}

<div class="container py-5" style="max-width:500px;">

    <h2 class="mb-4">Create Account</h2>

    <form method="post">

    {% csrf_token %}

    <div class="mb-3">
        <label>Username</label>
        <input
            type="text"
            name="username"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input
            type="email"
            name="email"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input
            type="password"
            name="password"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Confirm Password</label>
        <input
            type="password"
            name="confirm_password"
            class="form-control"
            required>
    </div>

    <button class="btn btn-primary w-100">
        Create Account
    </button>

</form>

</div>

{% endblock %}
