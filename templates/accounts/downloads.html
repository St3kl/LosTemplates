{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>My Downloads</h2>

    <hr>

    {% if items %}

        <div class="row g-3">

            {% for item in items %}

                <div class="col-md-4">

                    <div class="card shadow-sm">

                        <img src="{{ item.product.thumbnail.url }}"
                             class="card-img-top"
                             alt="{{ item.product.title }}">

                        <div class="card-body">

                            <h5>{{ item.product.title }}</h5>

                            <p class="text-muted small">
                                Purchased on {{ item.order.created_at }}
                            </p>

                            <a href="{% url 'orders:download' item.id %}"
                               class="btn btn-success w-100">

                                Download

                            </a>

                        </div>

                    </div>

                </div>

            {% endfor %}

        </div>

    {% else %}

        <p class="text-muted">
            You have no downloads yet.
        </p>

    {% endif %}

</div>

{% endblock %}
