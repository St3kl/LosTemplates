{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2>{{ title }}</h2>

    <form
        method="post"
        enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            class="btn btn-success">

            Save Product

        </button>

        <a
            href="{% url 'products:admin_product_list' %}"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
