<div class="card h-100 shadow-sm">
    <img src="{{ product.thumbnail.url }}" class="card-img-top" alt="{{ product.title }}">

    <div class="card-body">
        <h5>{{ product.title }}</h5>

        <p>{{ product.short_description }}</p>

        <h4>${{ product.price }}</h4>

        <a href="/products/{{ product.slug }}/" class="btn btn-primary">
            View Details
        </a>
    </div>
</div>
