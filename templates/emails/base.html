<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:40px;
}

.wrapper{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:10px;
}

.header{
    font-size:28px;
    font-weight:bold;
    color:#0d6efd;
    margin-bottom:30px;
}

.footer{
    margin-top:40px;
    font-size:13px;
    color:#777;
}

.button{
    display:inline-block;
    padding:12px 24px;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

LosTemplates

</div>

{% block content %}
{% endblock %}

<div class="footer">

© {{ year }} LosTemplates

</div>

</div>

</body>

</html>
