{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">

        ❤️ My Wishlist

    </h2>

    {% if items %}

        <div class="row">

            {% for item in items %}

                <div class="col-md-4 mb-4">

                    <div class="card h-100">

                        {% if item.product.thumbnail %}

<img
    src="{{ item.product.thumbnail.url }}"
    class="card-img-top"
    alt="{{ item.product.title }}">

{% endif %}

                        <div class="card-body">

                            <h5>

                                {{ item.product.title }}

                            </h5>

                            <p>

                                ${{ item.product.price }}

                            </p>

                            <a
                                href="{% url 'products:product_detail' item.product.slug %}"
                                class="btn btn-primary"
                            >

                                View

                            </a>

                        </div>

                    </div>

                </div>

            {% endfor %}

        </div>

    {% else %}

        <div class="alert alert-info">

            Your wishlist is empty.

        </div>

    {% endif %}

</div>

{% endblock %}
