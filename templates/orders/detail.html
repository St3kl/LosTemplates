{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>Order #{{ order.id }}</h2>

    <p>Status: {{ order.status }}</p>

    <p>Total: ${{ order.total_price }}</p>

    <hr>

    <h4>Items</h4>

    <ul class="list-group">

        {% for item in order.items.all %}

            <li class="list-group-item d-flex justify-content-between">

                {{ item.product.title }}

                <span>${{ item.price }}</span>

            </li>

        {% endfor %}

    </ul>

</div>

{% endblock %}
